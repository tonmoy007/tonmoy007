name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight
  workflow_dispatch:       # manual trigger

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: tonmoy007
          outputs: |
            assets/snake.svg?palette=github-dark&color_snake=#a855f7&color_dots=#1a1a2e,#16213e,#0f3460,#533483,#a855f7

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update contribution snake animation"
          commit_user_name: snake-bot
          commit_user_email: snake-bot@users.noreply.github.com

<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="50%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff00a0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="340" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <line x1="0" y1="280" x2="1000" y2="280" stroke="#00f5ff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="300" x2="1000" y2="300" stroke="#00f5ff" stroke-opacity="0.04" stroke-width="0.5"/>
  <line x1="0" y1="60" x2="1000" y2="60" stroke="#00f5ff" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1000" height="2" fill="url(#accent)"/>

  <!-- Corner brackets -->
  <path d="M20,20 L20,80" stroke="#00f5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M20,20 L80,20" stroke="#00f5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M980,20 L980,80" stroke="#7b2ff7" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M980,20 L920,20" stroke="#7b2ff7" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M20,320 L20,260" stroke="#00f5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M20,320 L80,320" stroke="#00f5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M980,320 L980,260" stroke="#7b2ff7" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M980,320 L920,320" stroke="#7b2ff7" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Scan line effect -->
  <rect x="0" y="100" width="1000" height="1" fill="#00f5ff" opacity="0.08"/>
  <rect x="0" y="200" width="1000" height="1" fill="#00f5ff" opacity="0.08"/>

  <!-- Name -->
  <text x="500" y="130" font-family="'Courier New', monospace" font-size="64" font-weight="bold" fill="none" stroke="url(#accent)" stroke-width="1.5" text-anchor="middle" filter="url(#glowText)">
    SADDAM HOSSAIN
  </text>

  <!-- Glow underline -->
  <rect x="250" y="145" width="500" height="2" fill="url(#accent2)" opacity="0.8" rx="1"/>

  <!-- Tagline -->
  <text x="500" y="175" font-family="'Courier New', monospace" font-size="16" fill="#00f5ff" text-anchor="middle" opacity="0.9" letter-spacing="4">
    &lt; AI AGENT INFRASTRUCTURE ENGINEER /&gt;
  </text>

  <!-- Terminal line 1 -->
  <text x="50" y="225" font-family="'Courier New', monospace" font-size="13" fill="#00f5ff" opacity="0.6">&gt; _SYSTEM.init()</text>
  <text x="50" y="245" font-family="'Courier New', monospace" font-size="13" fill="#7b2ff7" opacity="0.8">[ORCHESTRATION] .......... ONLINE</text>
  <text x="50" y="265" font-family="'Courier New', monospace" font-size="13" fill="#ff00a0" opacity="0.8">[AGENT_BOUNDARY] ......... SECURE</text>
  <text x="50" y="285" font-family="'Courier New', monospace" font-size="13" fill="#00f5ff" opacity="0.6">[SDLC_PIPELINE] ......... 12-STAGE</text>
  <text x="50" y="305" font-family="'Courier New', monospace" font-size="13" fill="#00ff88" opacity="0.8">[STATUS] ............. OPERATIONAL</text>

  <!-- Blinking cursor -->
  <text x="50" y="325" font-family="'Courier New', monospace" font-size="13" fill="#00f5ff" opacity="0.9">&gt; <tspan>_</tspan></text>

  <!-- Version badge bottom right -->
  <rect x="830" y="305" width="140" height="25" rx="3" fill="none" stroke="#00f5ff" stroke-width="0.5" opacity="0.4"/>
  <text x="835" y="321" font-family="'Courier New', monospace" font-size="10" fill="#00f5ff" opacity="0.4">v2.0.0 // AGENT_CORE</text>
</svg>

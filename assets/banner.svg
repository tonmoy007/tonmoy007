<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0e0e1a"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14141f"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#14141f"/>
    </linearGradient>
    <linearGradient id="quoteGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="40%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00f0ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="85%" stop-color="#f472b6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>

    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      @keyframes floatUp { 0%, 100% { opacity: 0; transform: translateY(0); } 20% { opacity: 0.6; } 80% { opacity: 0.6; } 100% { opacity: 0; transform: translateY(-20px); } }
      @keyframes scanDown { 0% { transform: translateY(-420px); opacity: 0; } 10% { opacity: 0.08; } 90% { opacity: 0.08; } 100% { transform: translateY(420px); opacity: 0; } }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes breathe { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.35; } }
      .cursor { animation: blink 1s step-end infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .scan { animation: scanDown 3s ease-in-out infinite; }
      .float-particle { animation: floatUp 4s ease-in-out infinite; }
      .breathe { animation: breathe 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="420" fill="url(#bgGrad)" rx="12"/>

  <!-- Terminal window border -->
  <rect x="15" y="15" width="970" height="390" rx="12" fill="none" stroke="#22223a" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="15" y="15" width="970" height="36" rx="12" fill="url(#headerGrad)"/>
  <rect x="15" y="39" width="970" height="12" fill="url(#headerGrad)"/>

  <!-- Window dots -->
  <circle cx="38" cy="33" r="5.5" fill="#ff5f57"/>
  <circle cx="58" cy="33" r="5.5" fill="#febc2e"/>
  <circle cx="78" cy="33" r="5.5" fill="#28c840"/>

  <!-- Title -->
  <text x="500" y="39" font-family="'SF Mono','Courier New',monospace" font-size="12" fill="#555577" text-anchor="middle" letter-spacing="1">
    AGENT_TERMINAL — v3.0 — deterministic mode
  </text>

  <!-- Scanning line -->
  <rect x="15" y="15" width="970" height="2" fill="#00f0ff" opacity="0.06" class="scan"/>

  <!-- Boot sequence lines (left column) -->
  <g font-family="'SF Mono','Courier New',monospace" font-size="11">
    <text x="35" y="85" fill="#555577">[</text>
    <text x="41" y="85" fill="#28c840">✓</text>
    <text x="55" y="85" fill="#555577">] kernel loaded</text>
    <text x="35" y="103" fill="#555577">[</text>
    <text x="41" y="103" fill="#28c840">✓</text>
    <text x="55" y="103" fill="#555577">] agent_core v3.0.1</text>
    <text x="35" y="121" fill="#555577">[</text>
    <text x="41" y="121" fill="#28c840">✓</text>
    <text x="55" y="121" fill="#555577">] model registry: initialized</text>
    <text x="35" y="139" fill="#555577">[</text>
    <text x="41" y="139" fill="#00f0ff">→</text>
    <text x="55" y="139" fill="#555577">] toolchain: live · 14 tools</text>
    <text x="35" y="157" fill="#555577">[</text>
    <text x="41" y="157" fill="#00f0ff">→</text>
    <text x="55" y="157" fill="#555577">] reasoning engine: active</text>
    <text x="35" y="175" fill="#555577">[</text>
    <text x="41" y="175" fill="#a855f7">◇</text>
    <text x="55" y="175" fill="#555577">] session: esoteric-2026-07</text>
  </g>

  <!-- Status panel (right side) -->
  <g font-family="'SF Mono','Courier New',monospace" font-size="10">
    <rect x="780" y="75" width="185" height="110" rx="6" fill="#12121e" stroke="#1e1e32" stroke-width="1"/>

    <text x="792" y="95" fill="#444466">SESSION</text>
    <text x="860" y="95" fill="#a855f7">ACTIVE</text>
    <circle cx="940" cy="91" r="3.5" fill="#28c840" class="pulse"/>

    <text x="792" y="115" fill="#444466">MODEL</text>
    <text x="860" y="115" fill="#00f0ff">opencode-zen</text>

    <text x="792" y="135" fill="#444466">MODE</text>
    <text x="860" y="135" fill="#f472b6">deterministic</text>

    <text x="792" y="155" fill="#444466">PROVIDER</text>
    <text x="860" y="155" fill="#7c3aed">big-pickle</text>

    <text x="792" y="175" fill="#444466">UPTIME</text>
    <text x="860" y="175" fill="#555577">14d : 07h : 32m</text>
  </g>

  <!-- Separator line -->
  <line x1="35" y1="200" x2="965" y2="200" stroke="#1e1e32" stroke-width="1"/>

  <!-- Prompt symbol -->
  <text x="35" y="228" font-family="'SF Mono','Courier New',monospace" font-size="14" fill="#28c840">$</text>
  <text x="52" y="228" font-family="'SF Mono','Courier New',monospace" font-size="13" fill="#555577">think</text>
  <text x="95" y="228" font-family="'SF Mono','Courier New',monospace" font-size="13" fill="#555577" font-style="italic">--mode=philosophical</text>

  <!-- Output line -->
  <text x="52" y="255" font-family="'SF Mono','Courier New',monospace" font-size="13" fill="#555577">└─&gt;</text>
  <text x="88" y="255" font-family="'SF Mono','Courier New',monospace" font-size="13" fill="#555577">resolving...</text>

  <!-- The quote - main philosophical statement -->
  <text x="500" y="305" font-family="'SF Mono','Courier New',monospace" font-size="22" fill="url(#quoteGrad)" text-anchor="middle" font-weight="700" filter="url(#glowCyan)" letter-spacing="2">
    Code is a theory of reality
  </text>
  <text x="500" y="335" font-family="'SF Mono','Courier New',monospace" font-size="22" fill="url(#quoteGrad)" text-anchor="middle" font-weight="700" filter="url(#glowCyan)" letter-spacing="2">
    that we run.
  </text>

  <!-- Attribution -->
  <text x="500" y="360" font-family="'SF Mono','Courier New',monospace" font-size="11" fill="#444466" text-anchor="middle" opacity="0.6">
    ~ unknown engineer, sometime after midnight
  </text>

  <!-- Bottom status bar -->
  <rect x="15" y="376" width="970" height="28" rx="0" fill="#14141f"/>
  <rect x="15" y="376" width="970" height="28" rx="12" fill="#14141f"/>
  <rect x="15" y="390" width="970" height="14" fill="#14141f"/>

  <text x="35" y="394" font-family="'SF Mono','Courier New',monospace" font-size="10" fill="#444466">NORMAL</text>
  <text x="100" y="394" font-family="'SF Mono','Courier New',monospace" font-size="10" fill="#28c840">●</text>
  <text x="110" y="394" font-family="'SF Mono','Courier New',monospace" font-size="10" fill="#444466">all systems nominal</text>

  <text x="500" y="394" font-family="'SF Mono','Courier New',monospace" font-size="10" fill="#444466" text-anchor="middle">mode: deterministic | temp: 0.2 | tokens: ~infinity</text>

  <text x="880" y="394" font-family="'SF Mono','Courier New',monospace" font-size="10" fill="#444466">AGENT_TERMINAL v3.0</text>
  <circle cx="952" cy="390" r="2.5" fill="#00f0ff" class="pulse"/>

  <!-- Cursor -->
  <text x="500" y="394" font-family="'SF Mono','Courier New',monospace" font-size="12" fill="#00f0ff" class="cursor">_</text>
</svg>
